# =============================================================================
# bx-Blogger — Production Compose Stack (flat layout, self-contained)
#
# Run with:
#   docker compose -f docker-compose.prod.yml up -d
#
# Standalone prod stack — not an override. Operators clone the repo,
# populate a prod .env from their secrets manager, and run the above command.
#
# See DEV-NOTES/PLAN.md §17 for the full operator-choices matrix.
# =============================================================================

services:
  app:
    image: ghcr.io/mrigsby/bx-blogger:${RELEASE_TAG:-latest}
    container_name: bx-blogger-app
    env_file: .env
    environment:
      ENVIRONMENT: production
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bx-blogger

  worker:
    image: ghcr.io/mrigsby/bx-blogger:${RELEASE_TAG:-latest}
    container_name: bx-blogger-worker
    env_file: .env
    environment:
      ENVIRONMENT: production
    command: [ "box", "cbq:work", "--tries=3" ]
    volumes:
      - backup-data:/var/backups/bx-blogger
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks:
      - bx-blogger

  mysql:
    # Containerized by default. Delete this block and set DB_HOST in prod .env
    # to use external managed MySQL.
    image: mysql:8.4
    container_name: bx-blogger-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - bx-blogger

  nginx:
    image: nginx:1.27-alpine
    container_name: bx-blogger-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/tls:/etc/nginx/tls:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks:
      - bx-blogger

volumes:
  mysql-data:
    name: bx-blogger-mysql-prod
  backup-data:
    name: bx-blogger-backups-prod

networks:
  bx-blogger:
    driver: bridge

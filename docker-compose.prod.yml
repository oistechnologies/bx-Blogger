# =============================================================================
# bx-Blogger — Production Compose Stack (flat layout, self-contained)
#
# Run with:
#   docker compose -f docker-compose.prod.yml up -d
#
# Reverse-proxy / TLS posture
# ---------------------------
# This stack does NOT ship an nginx service. The production target runs a
# pre-existing Nginx Proxy Manager (NPM) instance on the host and routes
# traffic to this app through it. The `app` service joins a shared Docker
# network that NPM is also attached to, and NPM's dashboard points a proxy
# host at container:port `bx-blogger-app:8080`.
#
# See docs/operators/NGINX-PROXY-MANAGER.md for the step-by-step NPM setup.
#
# Multi-instance on one Docker host
# ---------------------------------
# To run more than one bx-Blogger stack on the same host, give each stack
# its own directory and set `COMPOSE_PROJECT_NAME` in that stack's `.env`
# (e.g., COMPOSE_PROJECT_NAME=blog-site1). Every container_name + volume
# name below templates on that variable, so sites don't clash. Each stack
# attaches to the same external proxy network; NPM points a separate
# proxy host at each stack's app container by its unique name.
#
# See docs/operators/MULTI-INSTANCE.md for the full pattern.
#
# For deployments that want a self-contained nginx in the stack (e.g.,
# bare-metal VPS with no pre-existing proxy), see the historical
# docker-compose.prod.yml in git history at commit bd1a144 — swap
# that in and delete the `proxy` network references below.
# =============================================================================

services:
  app:
    image: ghcr.io/oistechnologies/bx-blogger:${RELEASE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-bx-blogger}-app
    env_file: .env
    environment:
      ENVIRONMENT: production
      # Phase 10.E — one JSON object per stdout line so the Docker
      # log driver (journald / fluentd / Loki / ELK) can index every
      # event by level/category without regex-scraping free text.
      LOG_FORMAT: json
      # Default the S3 backup prefix to the compose project name so
      # multiple bx-Blogger stacks on one host / sharing one B2
      # bucket land under distinct folders (e.g., `site-a/…`,
      # `site-b/…`). Operator can override in .env if they want a
      # different folder scheme.
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-${COMPOSE_PROJECT_NAME:-bx-blogger}}
      # Same multi-tenant default for media uploads when the operator
      # has enabled the S3 media disk (S3_BUCKET_MEDIA set in .env).
      # Dropping this to blank in .env puts files at the bucket root,
      # which is the right call for single-tenant installs.
      S3_MEDIA_PREFIX: ${S3_MEDIA_PREFIX:-${COMPOSE_PROJECT_NAME:-bx-blogger}}
    # No `ports:` block — the app is not published to the host. NPM reaches
    # it via the shared `proxy` network below using container DNS:
    #     scheme=http, host=${COMPOSE_PROJECT_NAME:-bx-blogger}-app, port=8080
    volumes:
      # Persistent user content — survives container recreation when a
      # new product image is pulled. Without these mounts, every
      # `docker compose up -d` following an image pull wipes uploads
      # and rendered OG cards because they live in the container's
      # ephemeral writable layer.
      #
      # Defaults are subdirs of this compose file's directory, so on a
      # fresh install Docker auto-creates them right next to the
      # docker-compose.prod.yml + .env. Override via the *_HOST_PATH
      # env variables in .env when storing on a NAS mount, dedicated
      # SSD, etc.
      #
      # Container paths match what the app expects:
      #   media/    — user uploads. Used only when S3_BUCKET_MEDIA is
      #               unset in .env (Local fallback); a configured S3
      #               bucket takes over and this mount becomes dormant.
      #   og/       — rendered OG card PNGs (regeneratable, but bind-
      #               mounted to avoid the post-deploy regen burst)
      #
      # NOTE on branding: `/app/includes/public/branding` is NOT
      # bind-mounted. Branding logos ship baked into the image via
      # COPY in the Dockerfile, so the admin sees whatever the product
      # release includes. If we mounted a host dir over the top the
      # image-bundled files would be shadowed by an empty host dir
      # and admin `<img>` tags 404.
      #
      # UPGRADING an existing install that wrote files into the
      # container's ephemeral layer: rsync them to the bind-mount
      # target BEFORE the first deploy with these mounts. Otherwise
      # the `up -d` will present empty dirs and the old files go
      # down with the recreated container.
      - ${MEDIA_HOST_PATH:-./media}:/app/includes/public/media
      - ${OG_HOST_PATH:-./og}:/app/includes/public/og
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bx-blogger     # private — app ↔ mysql
      - proxy          # shared with NPM for inbound traffic

  # NOTE on the queue worker:
  #
  # cbq is configured (see config/cbq.bx) to register workers IN-PROCESS
  # inside the `app` container — HTTP threads and worker threads share
  # the same JVM. For blog-scale workloads (SendEmailJob, GenerateThumbnailsJob,
  # RebuildSitemapJob, BackupDatabaseJob, RecordPostViewJob — all I/O-bound
  # and bursty rather than sustained-CPU) that's the right default, and
  # it's what the product's test suite + CI exercises.
  #
  # Earlier versions of this template shipped a standalone `worker` service
  # that ran `box cbq:work` alongside the app. On every deploy it raced the
  # in-process pool and crashed in ways that weren't obvious until you were
  # debugging at 11pm. The service was removed here so operators copying
  # this template don't fall into the same trap.
  #
  # If a future workload genuinely needs a split worker, re-introduce:
  #
  #   worker:
  #     image: ghcr.io/oistechnologies/bx-blogger:${RELEASE_TAG:-latest}
  #     container_name: ${COMPOSE_PROJECT_NAME:-bx-blogger}-worker
  #     env_file: .env
  #     environment:
  #       ENVIRONMENT: production
  #       LOG_FORMAT: json
  #       CBQ_REGISTER_WORKERS: "false"   # turn OFF the in-process pool in `app`
  #     command: [ "/cbq-worker-entrypoint.sh" ]
  #     stop_grace_period: 35s
  #     volumes:
  #       - backup-data:/var/backups/bx-blogger
  #       - ${MEDIA_HOST_PATH:-./media}:/app/includes/public/media
  #       - ${OG_HOST_PATH:-./og}:/app/includes/public/og
  #     depends_on:
  #       app:
  #         condition: service_started
  #     restart: unless-stopped
  #     networks:
  #       - bx-blogger
  #
  # And flip CBQ_REGISTER_WORKERS=false on the app service so you don't
  # end up with two pools racing again.

  mysql:
    # Containerized by default. Delete this block and set DB_HOST in prod .env
    # to use external managed MySQL.
    image: mysql:8.4
    container_name: ${COMPOSE_PROJECT_NAME:-bx-blogger}-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - bx-blogger     # private only — never exposed to the proxy network

volumes:
  mysql-data:
    name: ${COMPOSE_PROJECT_NAME:-bx-blogger}-mysql-prod
  backup-data:
    name: ${COMPOSE_PROJECT_NAME:-bx-blogger}-backups-prod

networks:
  bx-blogger:
    driver: bridge

  # Shared network with Nginx Proxy Manager. The `external: true` flag tells
  # compose "don't create this — it already exists, just attach to it". The
  # network name must match whatever NPM is configured to use on the host
  # (common defaults: `npm_default`, `proxy`, `nginxproxymanager_default`).
  # Operator sets PROXY_NETWORK in prod .env to match their NPM stack.
  proxy:
    external: true
    name: ${PROXY_NETWORK:-npm_default}

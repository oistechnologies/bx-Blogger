name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']    # semver release tags trigger the full CI + image publish
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check (cfformat)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run cfformat:check via Ortus CommandBox image
        # Install only commandbox-cfformat (not the full box.json dep tree)
        # so the format check runs in seconds rather than minutes. The base
        # ortussolutions/commandbox image gets BoxLang at runtime via our
        # server.json cfengine:boxlang@1 setting.
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            ortussolutions/commandbox \
            sh -c "box install commandbox-cfformat --verbose && box run-script format:check"

  docker-build:
    name: Docker Build (R15 acceptance gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        # Validates the full Dockerfile end-to-end on every push — if any
        # ForgeBox module fails to resolve on BoxLang, or if warmup-server.sh
        # can't compile our classes, CI catches it before the next deploy.
        # This is R15 (Phase-0 acceptance gate) automated. The GHA cache
        # also primes the `tests` job so TestBox starts from a hot layer
        # instead of re-downloading every module.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: bx-blogger-app:dev     # same tag docker-compose.yml expects
          load: true                   # keep the image in the runner's local daemon
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tests:
    name: TestBox Integration Suite
    runs-on: ubuntu-latest
    needs: docker-build               # reuse the image that docker-build just produced/cached
    timeout-minutes: 20
    permissions:
      # EnricoMi/publish-unit-test-result-action writes a check run and
      # (on PRs) a comment summarizing pass/fail counts. The default
      # GITHUB_TOKEN scope on repos with restricted defaults is
      # `contents: read` only — the check-run POST 403s without these.
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Seed .env from .env.example
        # docker-compose.yml reads DB_PASSWORD / ADMIN_* / SMTP_HOST etc.
        # from .env. The example file ships working dev defaults; CI never
        # touches real secrets — the whole stack runs inside this
        # ephemeral workflow.
        run: cp .env.example .env

      - name: Rebuild app image using the GHA cache
        # docker-build already warmed the cache; this step is effectively
        # a no-op on a cache hit. Without it, `docker compose up` would
        # rebuild without the GHA cache and take ~4 minutes on every run
        # since the GHA cache is scoped per job.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: bx-blogger-app:dev
          load: true
          cache-from: type=gha

      - name: Start compose stack
        run: |
          docker compose up -d
          echo "Waiting for app to become healthy…"
          # /__health is the dev healthcheck (Main.bx). BoxLang cold starts
          # plus module activation can take a bit — we allow up to 2 min.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/__health || echo "000")
            if [ "$code" = "200" ]; then
              echo "✓ app healthy after ${i}×2s"
              break
            fi
            sleep 2
          done
          docker compose ps

      - name: Build theme assets (Vite)
        # ThemeServiceSpec asserts that `Theme.asset()` resolves CSS/JS
        # to Vite's hashed filenames via the manifest at
        # `themes/<slug>/assets/.vite/manifest.json`. That manifest +
        # the built CSS/JS are gitignored (themes/*/assets/) — they're
        # regenerated by `docker compose run --rm node npm run build`
        # in dev, so CI has to do the same before TestBox runs or the
        # hashed-filename assertion falls through to the `?v=version`
        # fallback and the spec fails.
        run: |
          docker compose run --rm node npm install
          docker compose run --rm node npm run build

      - name: Run migrations
        run: docker compose exec -T app box migrate up

      - name: Run TestBox suite
        # JUnit XML (antjunit format) is consumed by the publish step;
        # JSON is kept as a human-readable dump. `tests/results/` is
        # bind-mounted by compose so the files land in the runner's
        # workspace without an explicit copy-out.
        #
        # Two non-obvious CommandBox quirks wrapped up here:
        #
        # 1. Do NOT pass `reporter=` alongside `outputFormats`. When
        #    both are set, CommandBox honors the reporter for the live
        #    stream and silently skips the post-processing step that
        #    writes the format files. Omitting `reporter` makes it
        #    default to json and fan out to every format listed.
        #
        # 2. `outputFile` is RELATIVE — testbox-cli prepends getCWD()
        #    to whatever you pass. An absolute `/app/tests/results/...`
        #    becomes `/app/app/tests/results/...` and fails with
        #    "No such file or directory" during runReport. The workdir
        #    inside the container is /app, so `tests/results/...`
        #    resolves to /app/tests/results/... as expected.
        run: |
          mkdir -p tests/results
          docker compose exec -T app \
            box testbox run \
              outputFile=tests/results/test-results \
              outputFormats=json,antjunit \
              verbose=false

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: tests/results/**/*.xml
          check_name: "TestBox (BoxLang)"

      - name: Upload test-results artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbox-results
          path: tests/results/**/*

      - name: Dump app logs on failure
        if: failure()
        run: |
          echo "=== app logs (last 300 lines) ==="
          docker compose logs app --no-log-prefix | tail -300 || true
          echo "=== mysql logs (last 50 lines) ==="
          docker compose logs mysql --no-log-prefix | tail -50 || true

      - name: Tear down compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  publish-image:
    name: Publish image to GHCR
    # Phase 10.C.2 — publish the app image to GitHub Container Registry
    # so site deploy repos (oistechnologies/bx-blogger-com, opentag-dev)
    # can pull a pinned tag via their own deploy workflows. Tests are
    # the gate: `needs: tests` ensures a failing suite can never leak
    # a broken image downstream.
    #
    # Fires only on `push` (main-branch commits + semver tag pushes) or
    # manual `workflow_dispatch`. PRs run tests but never publish.
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write    # required to push to ghcr.io under this repo's namespace
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        # docker/metadata-action derives the full tag set from the push
        # context. For a main-branch push: `:main`, `:sha-<short>`,
        # `:latest`. For a v1.2.3 tag push: `:1.2.3`, `:sha-<short>`.
        # `{{is_default_branch}}` short-circuits so we never tag a feature
        # branch or a release tag as `:latest`.
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        # Registers binfmt_misc handlers so buildx can run foreign-arch
        # build steps (the arm64 leg) on this amd64 runner via emulation.
        # Required for the `platforms: linux/amd64,linux/arm64` setting
        # below — without it, buildx errors out the moment it tries to
        # exec an arm64 binary inside the build container.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        # Multi-arch publish: amd64 (prod hosts) + arm64 (Apple Silicon
        # dev machines). Without the arm64 leg, `docker compose pull`
        # on M-series Macs falls back to amd64-under-Rosetta or — if the
        # local manifest cache is cold — fails outright with "no matching
        # manifest for linux/arm64/v8". The arm64 leg runs under QEMU
        # emulation so this step takes ~2× as long as a single-arch build;
        # the GHA cache amortizes that across subsequent runs.
        #
        # Reuses the layer cache populated by the `docker-build` job
        # earlier in this workflow for the amd64 leg. The arm64 leg is
        # uncached on the first run after this change ships, then warms
        # up on subsequent main-branch pushes via `mode=max`.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
